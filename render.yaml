name: mask01-api
runtime: node
region: singapore
buildCommand: npm install && npm run build:server
startCommand: node api/dist/server.js
healthCheckPath: /api/health
envVars:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "3001"
  - key: JWT_SECRET
    value: mask01-jwt-secret-2024
